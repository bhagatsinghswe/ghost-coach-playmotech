# ==========================================
# Test Profile — H2 in-memory (wiped per test run)
# ==========================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.h2.console.enabled=false

# Dummy Gemini key so context loads — tests mock the WebClient
app.gemini.api-key=test-dummy-key
app.gemini.model=gemini-1.5-flash
app.gemini.base-url=https://generativelanguage.googleapis.com/v1beta

app.jwt.secret=test-secret-key-that-is-at-least-sixty-four-characters-long-for-hs256
app.jwt.expiration-ms=3600000

app.upload.dir=./test-uploads
app.cors.allowed-origins=http://localhost:3000

logging.level.com.playmotech=WARN
logging.level.org.springframework.security=WARN
