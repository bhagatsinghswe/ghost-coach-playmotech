# ==========================================
# Prod Profile — PostgreSQL
# ==========================================

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ghostcoach}
spring.datasource.username=${DATABASE_USER:ghostcoach}
spring.datasource.password=${DATABASE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

logging.level.com.playmotech=INFO
logging.level.root=WARN
