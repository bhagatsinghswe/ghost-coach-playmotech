# ==========================================
# Ghost Coach — Application Configuration
# ==========================================

spring.application.name=ghost-coach

# Active profile (override with: spring.profiles.active=prod)
spring.profiles.active=${SPRING_PROFILE:dev}

# ---- Server ----
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# ---- Jackson ----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ---- File Upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ---- File Storage ----
app.upload.dir=${UPLOAD_DIR:./uploads}
app.upload.max-size-bytes=5242880

# ---- JWT ----
app.jwt.secret=${JWT_SECRET:ghost-coach-super-secret-key-change-in-production-at-least-64-chars!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- Gemini Vision API ----
app.gemini.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
app.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
app.gemini.model=gemini-1.5-flash
app.gemini.timeout-seconds=60

# ---- CORS ----
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
